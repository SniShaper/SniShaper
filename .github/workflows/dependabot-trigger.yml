name: renovate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovate/renovate@v39
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
